default: &default
  dispatchers:
    - polling_interval: 10
      batch_size: 500
  workers:
    - queues: "imports"
      threads: 1
      processes: 1
      polling_interval: 30
    - queues: "default"
      threads: 1
      processes: 1
      polling_interval: 15

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
