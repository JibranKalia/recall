# PostgreSQL. Versions 12 and up are supported.
#
# Local Homebrew Postgres 17 listens on port 6543; override per-machine via
# the RECALL_PG_* env vars below if your setup differs.
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>
  host: <%= ENV.fetch("RECALL_PG_HOST") { "localhost" } %>
  port: <%= ENV.fetch("RECALL_PG_PORT") { 6543 } %>
  username: <%= ENV.fetch("RECALL_PG_USER") { ENV["USER"] } %>
  password: <%= ENV["RECALL_PG_PASSWORD"] %>
  # libpq's GSSAPI/Kerberos init crashes on the child side of fork() on
  # macOS (Apple's GSS framework uses XPC, which is not fork-safe). Solid
  # Queue forks workers, so disable GSS encryption negotiation entirely.
  gssencmode: disable

development:
  primary:
    <<: *default
    database: recall_development
  cache:
    <<: *default
    database: recall_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: recall_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: recall_development_cable
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: recall_test

production:
  primary:
    <<: *default
    database: recall_production
    username: recall
    password: <%= ENV["RECALL_DATABASE_PASSWORD"] %>
  cache:
    <<: *default
    database: recall_production_cache
    username: recall
    password: <%= ENV["RECALL_DATABASE_PASSWORD"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: recall_production_queue
    username: recall
    password: <%= ENV["RECALL_DATABASE_PASSWORD"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: recall_production_cable
    username: recall
    password: <%= ENV["RECALL_DATABASE_PASSWORD"] %>
    migrations_paths: db/cable_migrate
